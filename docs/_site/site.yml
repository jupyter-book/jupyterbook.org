# Shared configuration for all repositories that feed into jupyterbook.org .
# Because proxied sites are built with different base URLs, **all navigation links use fully-qualified URLs** (e.g., `https://jupyterbook.org/stable`) rather than relative paths.
# This ensures navigation works correctly regardless of which sub-site the user is viewing.
version: 1
site:
  template: book-theme
  nav:
    - title: Docs
      url: https://jupyterbook.org/stable
    - title: Community
      url: https://jupyterbook.org/community
    - title: Contribute
      url: https://jupyterbook.org/contribute
    - title: Blog
      url: https://jupyterbook.org/blog
    - title: Help
      url: https://jupyterbook.org/help
  options:
    logo_url: /
    favicon: https://raw.githubusercontent.com/jupyter-book/jupyterbook.org/refs/heads/main/docs/media/images/favicon.ico
    logo: https://raw.githubusercontent.com/jupyter-book/jupyterbook.org/refs/heads/main/docs/media/images/logo.svg
    logo_dark: https://raw.githubusercontent.com/jupyter-book/jupyterbook.org/refs/heads/main/docs/media/images/logo-dark.svg
    internal_domains: jupyterbook.org
  parts:
    footer: |
     ```{footer}
      title: Jupyter Book
      description: Create beautiful, publication-quality books and documents from computational content.
      logo: https://raw.githubusercontent.com/jupyter-book/jupyterbook.org/refs/heads/main/docs/media/images/logo-square.svg
      copyright: © 2026 Jupyter Book Contributors. Licensed under BSD-3.

      links:
        Documentation:
          - Getting Started: https://jupyterbook.org/stable/get-started/
          - User Guide: https://mystmd.org/guide
          - Reference: https://mystmd.org/guide/syntax-overview
        Community:
          - GitHub: https://github.com/jupyter-book
          - Chat with us: https://discord.mystmd.org
          - Contributing: https://jupyterbook.org/contribute/
        Related Projects:
          - MyST Markdown: https://mystmd.org
          - MyST Sandbox: https://mystmd.org/sandbox
          - Project Jupyter: https://jupyter.org

      icons:
        github: https://github.com/jupyter-book
        bluesky: https://bsky.app/profile/mystmd.org
        discord: https://discord.mystmd.org
      ```


